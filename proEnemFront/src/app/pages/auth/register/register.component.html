<div class="account-page">

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        <div class="overflow-hidden p-3 acc-vh">
            
            <!-- start row -->
            <div class="row w-100 g-0"> 

                <div class="col-lg-6 overflow-y-auto overflow-x-hidden">

                    <!-- start row -->
                    <div class="row">

                        <div class="col-md-10 mx-auto">
                            <form (ngSubmit)="navigate()" class="d-flex flex-column p-4 pb-0">
                                <div class="text-center mb-3 auth-logo">
                                    <img src="assets/img/logo.svg" class="img-fluid" alt="Logo">
                                </div>
                                <div>
                                    <div class="mb-3">
                                        <h3 class="mb-2">Cadastre-se gratuitamente</h3>
                                        <p class="mb-0">Criar nova conta</p>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Nome</label>
                                        <div class="input-group input-group-flat">
                                            <input type="text" class="form-control">
                                            <span class="input-group-text">
                                                <i class="ti ti-user"></i>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Telefone</label>
                                        <div class="input-group input-group-flat">
                                            <input type="text" class="form-control">
                                            <span class="input-group-text">
                                                <i class="ti ti-user"></i>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <div class="input-group input-group-flat">
                                            <input type="email" class="form-control">
                                            <span class="input-group-text">
                                                <i class="ti ti-mail"></i>
                                            </span>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Senha</label>
                                        <div class="input-group input-group-flat pass-group">
                                            <input [type]="password[1] ? 'text' : 'password' " class="pass-input form-control">
                                            <span class="input-group-text toggle-password" (click)="togglePassword(1)" tabindex="0"><i class="ti" [ngClass]=" password[1] ? 'ti-eye' : 'ti-eye-off'"></i></span>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Confirme a senha</label>
                                        <div class="input-group input-group-flat pass-group">
                                            <input [type]="password[2] ? 'text' : 'password' " class="pass-input form-control">
                                            <span class="input-group-text toggle-password" (click)="togglePassword(2)" tabindex="0"><i class="ti" [ngClass]=" password[2] ? 'ti-eye' : 'ti-eye-off'"></i></span>
                                        </div>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-between mb-3">
                                        <div class="form-check form-check-md d-flex align-items-center">
                                            <input class="form-check-input mt-0" type="checkbox" value="" id="checkebox-md" checked="">
                                            <label class="form-check-label ms-1" for="checkebox-md">Eu aceito os <a href="javascript:void(0);" class="text-primary link-hover">Termos & Privacidade</a>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <button type="submit" class="btn btn-primary w-100">Registrar</button>
                                    </div>
                                    <div class="mb-3">
                                        <p class="mb-0">Já possui uma conta? <a routerLink="/login" class="link-indigo fw-bold link-hover"> Entrar</a></p>
                                    </div>
                                    <div class="or-login text-center position-relative mb-3">
                                        <h6 class="fs-14 mb-0 position-relative text-body">OU</h6>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-center flex-wrap gap-2 mb-3 ">

                                        <div class="text-center flex-fill google-btn">
                                            <a href="javascript:void(0);" class="p-2 btn btn-outline-light d-flex align-items-center justify-content-center">
                                                <img class="img-fluid  m-1" src="assets/img/icons/google-logo.svg" alt="Google">
                                            </a>
                                        </div>

                                    </div>
                                </div>
                                <div class="text-center pb-4">
                                    <p class="text-dark mb-0">Copyright &copy; <script>document.write(new Date().getFullYear())</script> - Pro Enem</p>
                                </div>
                            </form>
                        </div> <!-- end col -->

                    </div>
                    <!-- end row -->

                </div> <!-- end col -->

                

            </div>
            <!-- end row -->

        </div>

    </div>
    <!-- End Wrapper -->



</div>
