<div class="cardhead">


 <!-- Page Header -->
                <div class="mb-4">
                    <h4 class="mb-1">Light Box</h4>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0 p-0">
                            <li class="breadcrumb-item"><a [routerLink]="routes.index">Home</a></li>
                            <li class="breadcrumb-item"><a href="#">Advanced UI</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Light Box</li>
                        </ol>
                    </nav>
				</div>
				<!-- End Page Header -->

  <div class="row">
    <!-- Lightbox -->
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Single Image Lightbox</h5>
        </div>
        <div class="card-body">
          <div class="row">
            @for (image of albumsOne; track image; let i = $index) {
              @if (i < 2) {
                <div class="col-md-4 mb-2 mb-md-0">
                  <img
                    class="img-fluid"
                    [src]="image.src"
                    (click)="open(i, albumsOne)"
                    />
                  </div>
                }
              }
            </div>
          </div>
        </div>
      </div>
      <!-- /Lightbox -->

      <!-- Lightbox -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title">Image with Description</h5>
          </div>
          <div class="card-body">
            <div class="row">
              @for (image of albumsTwo; track image; let i = $index) {
                @if (i > 2) {
                  <div class="col-md-4 mb-2 mb-md-0">
                    <img
                      class="img-fluid"
                      [src]="image.src"
                      (click)="open(i, albumsTwo)"
                      />
                    </div>
                  }
                }
              </div>
            </div>
          </div>
        </div>
        <!-- /Lightbox -->
      </div>

    </div>
